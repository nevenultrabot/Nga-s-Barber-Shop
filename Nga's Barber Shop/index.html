<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Camille Barber Studio — Precision in Every Cut</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400;1,700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --c1: #7f4f24;
      --c2: #936639;
      --c3: #a68a64;
      --c4: #b6ad90;
      --c5: #c2c5aa;
      --dark: #1a1208;
      --light: #f5f0e8;
      --cream: #faf7f2;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Montserrat', sans-serif;
      background: var(--cream);
      color: var(--dark);
      cursor: none;
      overflow-x: hidden;
    }

    /* ── CUSTOM CURSOR ── */
    #cursor-dot {
      width: 8px; height: 8px;
      background: var(--c1);
      border-radius: 50%;
      position: fixed; top: 0; left: 0;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: transform 0.1s ease, background 0.3s;
    }
    #cursor-ring {
      width: 36px; height: 36px;
      border: 2px solid var(--c2);
      border-radius: 50%;
      position: fixed; top: 0; left: 0;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      transition: width 0.3s ease, height 0.3s ease, border-color 0.3s, transform 0.15s ease;
    }
    #cursor-ring.hovered {
      width: 56px; height: 56px;
      border-color: var(--c1);
      background: rgba(127, 79, 36, 0.08);
    }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--light); }
    ::-webkit-scrollbar-thumb { background: var(--c3); border-radius: 3px; }

    /* ── NAVBAR ── */
    .navbar {
      position: fixed; top: 0; width: 100%; z-index: 1000;
      padding: 0 3rem;
      display: flex; align-items: center; justify-content: space-between;
      height: 72px;
      transition: background 0.4s ease, box-shadow 0.4s ease, backdrop-filter 0.4s;
    }
    .navbar.scrolled {
      background: rgba(26, 18, 8, 0.92);
      backdrop-filter: blur(16px);
      box-shadow: 0 4px 40px rgba(0,0,0,0.3);
    }
    .navbar.top { background: transparent; }
    .nav-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem; font-weight: 700;
      color: #fff; letter-spacing: 0.02em;
      text-decoration: none;
    }
    .nav-logo span { color: var(--c4); }
    .nav-links { display: flex; gap: 2.5rem; list-style: none; }
    .nav-links a {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.78rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.12em;
      color: rgba(255,255,255,0.8);
      text-decoration: none;
      position: relative; padding-bottom: 4px;
      transition: color 0.3s;
    }
    .nav-links a::after {
      content: ''; position: absolute; bottom: 0; left: 0;
      width: 0; height: 1.5px; background: var(--c4);
      transition: width 0.35s cubic-bezier(0.4,0,0.2,1);
    }
    .nav-links a:hover { color: #fff; }
    .nav-links a:hover::after { width: 100%; }
    .nav-book-btn {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.72rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.15em;
      background: var(--c1); color: #fff;
      border: none; padding: 0.6rem 1.4rem;
      cursor: none; transition: background 0.3s, transform 0.2s, box-shadow 0.3s;
    }
    .nav-book-btn:hover {
      background: var(--c2);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(127,79,36,0.4);
    }
    .hamburger {
      display: none; flex-direction: column; gap: 5px;
      background: none; border: none; cursor: none; padding: 4px;
    }
    .hamburger span {
      width: 24px; height: 2px; background: #fff;
      transition: all 0.3s;
    }

    /* ── HERO ── */
    .hero {
      position: relative; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .hero-bg {
      position: absolute; inset: 0;
      background:
        linear-gradient(135deg, rgba(26,18,8,0.88) 0%, rgba(127,79,36,0.55) 50%, rgba(26,18,8,0.82) 100%),
        url('https://images.unsplash.com/photo-1503951914875-452162b0f3f1?w=1600&auto=format&fit=crop') center/cover no-repeat;
    }
    .hero-noise {
      position: absolute; inset: 0; opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }
    .hero-deco-line {
      position: absolute; left: 0; top: 0; bottom: 0;
      width: 4px; background: linear-gradient(to bottom, transparent, var(--c3), transparent);
      opacity: 0.6;
    }
    .hero-content {
      position: relative; z-index: 2;
      text-align: center; max-width: 860px; padding: 2rem;
      animation: heroFadeUp 1.1s ease both;
    }
    @keyframes heroFadeUp {
      from { opacity: 0; transform: translateY(36px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .hero-eyebrow {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.72rem; font-weight: 700;
      letter-spacing: 0.28em; text-transform: uppercase;
      color: var(--c4); margin-bottom: 1.2rem;
      animation: heroFadeUp 1.1s 0.15s ease both;
    }
    .hero-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.8rem, 6vw, 5.2rem);
      font-weight: 900; line-height: 1.1;
      color: #fff; margin-bottom: 1.5rem;
      animation: heroFadeUp 1.1s 0.25s ease both;
    }
    .hero-title em { font-style: italic; color: var(--c4); }
    .hero-sub {
      font-family: 'Montserrat', sans-serif;
      font-size: 1rem; font-weight: 300; line-height: 1.8;
      color: rgba(255,255,255,0.7); max-width: 560px; margin: 0 auto 2.5rem;
      animation: heroFadeUp 1.1s 0.35s ease both;
    }
    .hero-ctas {
      display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;
      animation: heroFadeUp 1.1s 0.45s ease both;
    }
    .btn-primary {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.78rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.18em;
      background: var(--c1); color: #fff;
      border: 2px solid var(--c1);
      padding: 1rem 2.4rem; cursor: none;
      transition: background 0.3s, color 0.3s, transform 0.25s, box-shadow 0.3s;
      text-decoration: none; display: inline-block;
    }
    .btn-primary:hover {
      background: var(--c2); border-color: var(--c2);
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(127,79,36,0.45);
    }
    .btn-outline {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.78rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.18em;
      background: transparent; color: #fff;
      border: 2px solid rgba(255,255,255,0.45);
      padding: 1rem 2.4rem; cursor: none;
      transition: border-color 0.3s, background 0.3s, transform 0.25s;
      text-decoration: none; display: inline-block;
    }
    .btn-outline:hover {
      border-color: var(--c4); background: rgba(182,173,144,0.1);
      transform: translateY(-3px);
    }
    .hero-scroll {
      position: absolute; bottom: 2.5rem; left: 50%;
      transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center;
      gap: 8px; color: rgba(255,255,255,0.5);
      font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase;
      animation: heroFadeUp 1.1s 0.6s ease both;
    }
    .scroll-line {
      width: 1px; height: 48px;
      background: linear-gradient(to bottom, rgba(255,255,255,0.5), transparent);
      animation: scrollPulse 2s ease-in-out infinite;
    }
    @keyframes scrollPulse {
      0%, 100% { opacity: 0.5; transform: scaleY(1); }
      50% { opacity: 1; transform: scaleY(1.15); }
    }
    .hero-stats {
      position: absolute; bottom: 5rem; right: 4rem;
      display: flex; flex-direction: column; gap: 1.5rem;
      animation: heroFadeUp 1.1s 0.5s ease both;
    }
    .stat { text-align: right; }
    .stat-num {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem; font-weight: 700; color: var(--c4);
    }
    .stat-label {
      font-size: 0.65rem; letter-spacing: 0.15em;
      text-transform: uppercase; color: rgba(255,255,255,0.5);
    }

    /* ── SECTIONS ── */
    .section { padding: 6rem 2rem; }
    .section-tag {
      font-size: 0.68rem; font-weight: 700;
      letter-spacing: 0.3em; text-transform: uppercase;
      color: var(--c2); margin-bottom: 0.75rem;
      display: flex; align-items: center; gap: 0.8rem;
    }
    .section-tag::before {
      content: ''; display: block;
      width: 28px; height: 1.5px; background: var(--c2);
    }
    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 700; line-height: 1.2;
      color: var(--dark); margin-bottom: 1rem;
    }
    .section-title em { font-style: italic; color: var(--c2); }
    .section-sub {
      font-size: 0.92rem; font-weight: 300; line-height: 1.85;
      color: #555; max-width: 560px;
    }
    .container { max-width: 1200px; margin: 0 auto; }

    /* ── ABOUT ── */
    .about-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 5rem; align-items: center;
      max-width: 1100px; margin: 0 auto;
    }
    .about-img-wrap {
      position: relative;
    }
    .about-img-main {
      width: 100%; aspect-ratio: 3/4;
      object-fit: cover;
      filter: sepia(20%) contrast(1.05);
    }
    .about-img-deco {
      position: absolute; top: -20px; left: -20px; right: 20px; bottom: 20px;
      border: 2px solid var(--c3); z-index: -1;
    }
    .about-badge {
      position: absolute; bottom: -20px; right: -20px;
      width: 100px; height: 100px;
      background: var(--c1);
      border-radius: 50%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: #fff;
    }
    .about-badge-num {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem; font-weight: 700; line-height: 1;
    }
    .about-badge-text {
      font-size: 0.5rem; letter-spacing: 0.12em;
      text-transform: uppercase; text-align: center;
    }
    .about-features { display: flex; flex-direction: column; gap: 1.2rem; margin-top: 2rem; }
    .about-feature {
      display: flex; gap: 1rem; align-items: flex-start;
    }
    .about-feature-icon {
      width: 40px; height: 40px; min-width: 40px;
      background: var(--c5); border-radius: 2px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
    }
    .about-feature-title {
      font-size: 0.85rem; font-weight: 700; letter-spacing: 0.05em;
      margin-bottom: 0.2rem;
    }
    .about-feature-desc {
      font-size: 0.78rem; color: #666; line-height: 1.6;
    }

    /* ── SERVICES ── */
    .services-section { background: var(--dark); }
    .services-section .section-title { color: #fff; }
    .services-section .section-sub { color: rgba(255,255,255,0.5); }
    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.5px; margin-top: 3.5rem;
      border: 1.5px solid rgba(255,255,255,0.06);
    }
    .service-card {
      background: rgba(255,255,255,0.03);
      padding: 2.5rem 2rem;
      border: 1.5px solid rgba(255,255,255,0.06);
      transition: background 0.35s, transform 0.3s, box-shadow 0.35s;
      position: relative; overflow: hidden;
    }
    .service-card::before {
      content: ''; position: absolute;
      bottom: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--c1), var(--c3));
      transform: scaleX(0); transform-origin: left;
      transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
    }
    .service-card:hover { background: rgba(127,79,36,0.1); transform: translateY(-4px); }
    .service-card:hover::before { transform: scaleX(1); }
    .service-icon {
      font-size: 2rem; margin-bottom: 1rem;
      width: 56px; height: 56px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(127,79,36,0.15);
      border-radius: 2px;
    }
    .service-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.25rem; font-weight: 600; color: #fff;
      margin-bottom: 0.5rem;
    }
    .service-desc {
      font-size: 0.8rem; color: rgba(255,255,255,0.45);
      line-height: 1.7; margin-bottom: 1.5rem;
    }
    .service-price {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem; color: var(--c4); font-weight: 700;
    }
    .service-price span { font-size: 0.75rem; color: rgba(255,255,255,0.35); font-family: 'Montserrat', sans-serif; font-weight: 400; }

    /* ── BOOKING ── */
    .booking-section { background: var(--light); }
    .booking-wrap {
      max-width: 900px; margin: 3.5rem auto 0;
      background: #fff;
      box-shadow: 0 20px 80px rgba(0,0,0,0.1);
    }
    .booking-steps-header {
      display: flex; background: var(--dark);
    }
    .step-tab {
      flex: 1; padding: 1.2rem 0.5rem;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      border-bottom: 3px solid transparent;
      transition: border-color 0.3s;
    }
    .step-tab.active { border-bottom-color: var(--c3); }
    .step-tab.done { border-bottom-color: var(--c1); }
    .step-num {
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem; font-weight: 700;
      background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.4);
      transition: background 0.3s, color 0.3s;
    }
    .step-tab.active .step-num { background: var(--c3); color: #fff; }
    .step-tab.done .step-num { background: var(--c1); color: #fff; }
    .step-label {
      font-size: 0.6rem; font-weight: 600; letter-spacing: 0.1em;
      text-transform: uppercase; color: rgba(255,255,255,0.35);
      transition: color 0.3s;
    }
    .step-tab.active .step-label, .step-tab.done .step-label { color: rgba(255,255,255,0.8); }
    .booking-body { padding: 2.5rem; }
    .booking-step-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem; font-weight: 700; color: var(--dark);
      margin-bottom: 0.3rem;
    }
    .booking-step-sub { font-size: 0.8rem; color: #888; margin-bottom: 2rem; }

    /* Barbers */
    .barbers-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; }
    .barber-card {
      border: 2px solid #eee; padding: 1.5rem 1rem;
      text-align: center; cursor: none;
      transition: border-color 0.3s, transform 0.25s, box-shadow 0.3s;
    }
    .barber-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
    .barber-card.selected { border-color: var(--c1); background: rgba(127,79,36,0.04); }
    .barber-avatar {
      width: 80px; height: 80px; border-radius: 50%;
      object-fit: cover; margin: 0 auto 1rem;
      border: 3px solid #eee; transition: border-color 0.3s;
    }
    .barber-card.selected .barber-avatar { border-color: var(--c1); }
    .barber-name { font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 600; }
    .barber-title { font-size: 0.7rem; color: #888; letter-spacing: 0.05em; margin-top: 2px; }
    .barber-rating { color: #f4a017; font-size: 0.75rem; margin-top: 4px; }

    /* Services */
    .services-list { display: flex; flex-direction: column; gap: 0.8rem; }
    .service-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 1.2rem; border: 2px solid #eee; cursor: none;
      transition: border-color 0.3s, background 0.25s, transform 0.2s;
    }
    .service-row:hover { transform: translateX(4px); background: var(--cream); }
    .service-row.selected { border-color: var(--c1); background: rgba(127,79,36,0.04); }
    .service-row-left { display: flex; align-items: center; gap: 1rem; }
    .service-row-icon { font-size: 1.3rem; }
    .service-row-name { font-weight: 600; font-size: 0.9rem; }
    .service-row-duration { font-size: 0.73rem; color: #888; }
    .service-row-price { font-family: 'Playfair Display', serif; font-size: 1.1rem; color: var(--c1); font-weight: 700; }
    .service-checkbox {
      width: 20px; height: 20px; border: 2px solid #ccc; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem; color: #fff;
      transition: background 0.2s, border-color 0.2s;
      margin-left: 0.8rem;
    }
    .service-row.selected .service-checkbox { background: var(--c1); border-color: var(--c1); }

    /* Calendar */
    .calendar-wrap { user-select: none; }
    .cal-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1rem;
    }
    .cal-month {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem; font-weight: 700; color: var(--dark);
    }
    .cal-nav {
      width: 34px; height: 34px; border: 1.5px solid #ddd;
      background: none; cursor: none; font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, border-color 0.2s;
    }
    .cal-nav:hover { background: var(--c1); border-color: var(--c1); color: #fff; }
    .cal-weekdays {
      display: grid; grid-template-columns: repeat(7, 1fr);
      gap: 4px; margin-bottom: 6px;
    }
    .cal-weekday {
      text-align: center; font-size: 0.65rem; font-weight: 700;
      letter-spacing: 0.08em; color: #aaa; padding: 4px 0;
    }
    .cal-days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .cal-day {
      aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
      font-size: 0.82rem; font-weight: 500; border-radius: 2px;
      cursor: none; transition: background 0.2s, color 0.2s, transform 0.15s;
    }
    .cal-day:not(.empty):not(.past):hover { background: var(--c5); transform: scale(1.08); }
    .cal-day.empty { opacity: 0; pointer-events: none; }
    .cal-day.past { color: #ccc; pointer-events: none; }
    .cal-day.selected { background: var(--c1) !important; color: #fff; transform: scale(1.12); }
    .cal-day.today { font-weight: 800; color: var(--c1); }

    /* Time Slots */
    .slots-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 0.6rem; }
    .time-slot {
      padding: 0.65rem 0.5rem;
      border: 1.5px solid #ddd;
      text-align: center; font-size: 0.78rem; font-weight: 600;
      cursor: none; transition: all 0.25s;
      position: relative;
    }
    .time-slot.available:hover { border-color: var(--c1); background: rgba(127,79,36,0.06); }
    .time-slot.selected { background: var(--c1); border-color: var(--c1); color: #fff; }
    .time-slot.taken, .time-slot.is-taken {
      background: #f5f5f5; color: #bbb;
      border-color: #eee; pointer-events: none;
    }
    .time-slot.is-taken {
       text-decoration: line-through;
    }
    .slot-status {
      font-size: 0.58rem; font-weight: 500;
      letter-spacing: 0.06em; display: block; margin-top: 2px;
    }
    .time-slot.taken .slot-status, .time-slot.is-taken .slot-status { color: #ccc; }
    .time-slot.available .slot-status { color: var(--c3); }
    .time-slot.selected .slot-status { color: rgba(255,255,255,0.7); }

    /* Confirm */
    .confirm-box {
      background: var(--dark); color: #fff; padding: 2rem;
      margin-bottom: 1.5rem;
    }
    .confirm-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.75rem 0; border-bottom: 1px solid rgba(255,255,255,0.08);
      font-size: 0.85rem;
    }
    .confirm-row:last-child { border-bottom: none; }
    .confirm-row-label { color: rgba(255,255,255,0.5); font-size: 0.75rem; letter-spacing: 0.08em; text-transform: uppercase; }
    .confirm-row-val { font-weight: 600; }
    .confirm-total { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--c4); }

    .booking-nav { display: flex; justify-content: space-between; margin-top: 2rem; gap: 1rem; }
    .btn-book-next {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.78rem; font-weight: 700;

// ── CUSTOM CURSOR ──
function useCursor() {
  useEffect(() => {
    const dot = document.getElementById('cursor-dot');
    const ring = document.getElementById('cursor-ring');
    let ringX = 0, ringY = 0;
    let dotX = 0, dotY = 0;
    let raf;

    function lerp(a, b, t) { return a + (b - a) * t; }
    function animate() {
      ringX = lerp(ringX, dotX, 0.14);
      ringY = lerp(ringY, dotY, 0.14);
      ring.style.left = ringX + 'px';
      ring.style.top = ringY + 'px';
      raf = requestAnimationFrame(animate);
    }
    raf = requestAnimationFrame(animate);

    function onMove(e) {
      dotX = e.clientX; dotY = e.clientY;
      dot.style.left = dotX + 'px';
      dot.style.top = dotY + 'px';
    }
    function onEnter() { ring.classList.add('hovered'); }
    function onLeave() { ring.classList.remove('hovered'); }

    document.addEventListener('mousemove', onMove);
    const interactives = document.querySelectorAll('a,button,[role="button"],[data-hover]');
    interactives.forEach(el => {
      el.addEventListener('mouseenter', onEnter);
      el.addEventListener('mouseleave', onLeave);
    });

    return () => {
      cancelAnimationFrame(raf);
      document.removeEventListener('mousemove', onMove);
    };
  }, []);
}

// ── REVEAL ON SCROLL ──
function useReveal() {
  useEffect(() => {
    const observer = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) { e.target.classList.add('visible'); }
      });
    }, { threshold: 0.12 });
    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    return () => observer.disconnect();
  }, []);
}

// ── BOOKING CALENDAR ──
function CalendarPicker({ selected, onChange }) {
  const now = new Date();
  const [view, setView] = useState({ month: now.getMonth(), year: now.getFullYear() });
  const firstDay = new Date(view.year, view.month, 1).getDay();
  const daysInMonth = new Date(view.year, view.month + 1, 0).getDate();
  const cells = [...Array(firstDay).fill(null), ...Array.from({length: daysInMonth}, (_,i) => i+1)];
  const isToday = d => d === now.getDate() && view.month === now.getMonth() && view.year === now.getFullYear();
  const isPast = d => {
    const date = new Date(view.year, view.month, d);
    const today = new Date(); today.setHours(0,0,0,0);
    return date < today;
  };
  const isSelected = d => selected && selected.getDate() === d && selected.getMonth() === view.month && selected.getFullYear() === view.year;
  const prevMonth = () => setView(v => v.month === 0 ? {month:11,year:v.year-1} : {month:v.month-1,year:v.year});
  const nextMonth = () => setView(v => v.month === 11 ? {month:0,year:v.year+1} : {month:v.month+1,year:v.year});

  return (
    <div className="calendar-wrap">
      <div className="cal-header">
        <button className="cal-nav" onClick={prevMonth}>‹</button>
        <div className="cal-month">{MONTHS[view.month]} {view.year}</div>
        <button className="cal-nav" onClick={nextMonth}>›</button>
      </div>
      <div className="cal-weekdays">{WEEKDAYS.map(d => <div className="cal-weekday" key={d}>{d}</div>)}</div>
      <div className="cal-days">
        {cells.map((d, i) => (
          <div
            key={i}
            className={`cal-day ${!d ? 'empty' : ''} ${d && isPast(d) ? 'past' : ''} ${d && isToday(d) ? 'today' : ''} ${d && isSelected(d) ? 'selected' : ''}`}
            onClick={() => d && !isPast(d) && onChange(new Date(view.year, view.month, d))}
          >
            {d || ''}
          </div>
        ))}
      </div>
    </div>
  );
}

// ── DATE/TIME UTILS ──
const formatToSheetDate = (dateObj, timeStr) => {
  if (!dateObj || !timeStr) return "";
  const d = new Date(dateObj);
  const dayName = d.toLocaleDateString('en-US', { weekday: 'long' });
  const monthName = d.toLocaleDateString('en-US', { month: 'long' });
  const dayDate = d.getDate();
  return `${dayName}, ${monthName} ${dayDate} - ${timeStr}`;
};

const formatToMachineDate = (dateObj, timeStr) => {
  if (!dateObj || !timeStr) return "";
  const d = new Date(dateObj);
  const year = d.getFullYear();
  const month = (d.getMonth() + 1).toString().padStart(2, '0');
  const day = d.getDate().toString().padStart(2, '0');
  
  const [time, modifier] = timeStr.split(' ');
  let [hours, minutes] = time.split(':');
  if (hours === '12') hours = '00';
  let h = parseInt(hours, 10);
  if (modifier === 'PM') h += 12;
  const hour = h.toString().padStart(2, '0');
  
  return `${year}-${month}-${day} ${hour}:${minutes}`;
};

const isSlotInPast = (dateObj, timeStr) => {
  const machineStr = formatToMachineDate(dateObj, timeStr);
  if (!machineStr) return false;
  const slotDate = new Date(machineStr.replace(' ', 'T'));
  return slotDate < new Date();
};

// ── BOOKING SYSTEM ──
function BookingSection({ bookingRef }) {
  const [step, setStep] = useState(1);
  const [barber, setBarber] = useState(null);
  const [services, setServices] = useState([]);
  const [date, setDate] = useState(null);
  const [slot, setSlot] = useState(null);
  const [booked, setBooked] = useState(false);
  const [confirmedBookings, setConfirmedBookings] = useState([]);
  const [bookedSlots, setBookedSlots] = useState([]); // Real-time from SheetDB
  const [clientInfo, setClientInfo] = useState({ name: '', email: '', phone: '' });
  const [clientErrors, setClientErrors] = useState({});

  // ── FETCH BOOKINGS FROM SHEETDB ──
  const fetchBookedSlots = useCallback(() => {
    fetch('https://sheetdb.io/api/v1/2v6v8c38cwjw8')
      .then(res => res.json())
      .then(data => {
        if (Array.isArray(data)) {
          // Store both time and barber for smarter checking
          const slots = data.map(item => ({
            vreme: (item.vreme || "").trim(),
            barber: (item.barber || "").trim()
          })).filter(item => item.vreme);
          setBookedSlots(slots);
        }
      })
      .catch(err => console.error("Error fetching booked slots:", err));
  }, []);

  useEffect(() => {
    fetchBookedSlots();
    // Refresh every 2 minutes for real-time vibe
    const interval = setInterval(fetchBookedSlots, 120000);
    return () => clearInterval(interval);
  }, [fetchBookedSlots]);

  const takenForBarber = barber ? (TAKEN_SLOTS[barber.id.toString()] || []) : [];

  const validateClient = () => {
    const errs = {};
    if (!clientInfo.name.trim()) errs.name = 'Name is required';
    if (!clientInfo.email.trim()) errs.email = 'Email is required';
    else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(clientInfo.email)) errs.email = 'Enter a valid email';
    if (!clientInfo.phone.trim()) errs.phone = 'Phone number is required';
    setClientErrors(errs);
    return Object.keys(errs).length === 0;
  };

  const handleConfirm = () => {
    const booking = {
      id: Date.now(),
      client: { ...clientInfo },
      barber: { id: barber.id, name: barber.name, title: barber.title },
      date: date?.toISOString(),
      slot,
      bookedAt: new Date().toISOString(),
    };


    // --- SHEETDB INTEGRATION ---
    const sheetData = {
      data: [{
        ime: clientInfo.name,
        vreme: formatToSheetDate(date, slot),
        telefon: clientInfo.phone,
        barber: barber.name
      }]
    };

    fetch('https://sheetdb.io/api/v1/2v6v8c38cwjw8', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(sheetData)
    })
    .then(response => response.json())
    .then(data => {
      console.log('SheetDB Success:', data);
      alert('Termin uspešno zakazan!');
      
      // Update local state and finish booking flow
      const existing = JSON.parse(localStorage.getItem('barber_bookings') || '[]');
      localStorage.setItem('barber_bookings', JSON.stringify([...existing, booking]));
      const key = `${barber.id}-${date?.toDateString()}-${slot}`;
      setConfirmedBookings(prev => [...prev, key]);
      
      // Refresh global booked slots
      fetchBookedSlots();
      
      setBooked(true);
    })
    .catch(error => {
      console.error('SheetDB Error:', error);
      // Still allow local success if the user wants, but no alert
      setBooked(true);
    });
  };

  const resetBooking = () => {
    setStep(1); setBarber(null);
    setDate(null); setSlot(null); setBooked(false);
    setClientInfo({ name: '', email: '', phone: '' });
    setClientErrors({});
    fetchBookedSlots(); // Refresh on reset
  };

  const slotTaken = (s) => {
    const combined = formatToSheetDate(date, s).trim();
    const currentBarberName = (barber?.name || "").trim().toLowerCase();

    // Only block if the slot specifically matches the current barber OR was booked WITHOUT a barber (legacy)
    const isBookedInSheet = bookedSlots.some(b => {
      const vremeMatch = b.vreme.trim() === combined;
      if (!vremeMatch) return false;
      
      const sheetBarber = b.barber.trim().toLowerCase();
      // If sheetBarber is empty, it's a "legacy" or "all-barber" block
      if (sheetBarber === "") return true;
      // Otherwise, it only blocks if it matches the current barber
      return sheetBarber === currentBarberName;
    });

    return isBookedInSheet || isSlotInPast(date, s) || takenForBarber.includes(s) || confirmedBookings.includes(`${barber?.id}-${date?.toDateString()}-${s}`);
  };

  const canNext = () => {
    if (step === 1) return !!barber;
    if (step === 2) return !!date;
    if (step === 3) return !!slot;
    if (step === 4) return clientInfo.name.trim() && clientInfo.email.trim() && clientInfo.phone.trim();
    return true;
  };

    if (step === 4) {

    }

  };

                <div className="step-num">{step > s.n ? '✓' : s.n}</div>
                <div className="step-label">{s.l}</div>
              </div>
            ))}
          </div>

          <div className="booking-body">
            {booked ? (
              <div className="success-box">
                <div className="success-icon">✓</div>
                <div className="success-title">Appointment Confirmed!</div>
                <p className="success-sub">
                  Hey <strong>{clientInfo.name}</strong>! Your session with <strong>{barber.name}</strong> is set for{' '}
                  <strong>{date?.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}</strong> at{' '}
                  <strong>{slot}</strong>.<br/>
                  A confirmation has been sent to <strong>{clientInfo.email}</strong>.
                </p>
                <button className="btn-book-next" style={{marginTop:'2rem'}} onClick={resetBooking}>Book Another</button>
              </div>
            ) : (
              <>
                {/* Step 1 — Barber */}
                {step === 1 && (
                  <>
                    <div className="booking-step-title">Choose Your Barber</div>
                    <div className="booking-step-sub">Each of our barbers brings unique expertise to the chair.</div>
                    <div className="barbers-grid">
                      {BARBERS.map(b => (
                        <div key={b.id} className={`barber-card ${barber?.id === b.id ? 'selected' : ''}`} onClick={() => setBarber(b)}>
                          <img className="barber-avatar" src={b.avatar} alt={b.name}/>
                          <div className="barber-name">{b.name}</div>

                          <div className="barber-title" style={{marginTop:'4px',color:'#aaa'}}>{b.spec}</div>

                {/* Step 2 — Date */}
                {step === 2 && (

// ── ADMIN PANEL ──
function AdminPanel({ onClose }) {
  const [bookings, setBookings] = useState([]);
  const [filter, setFilter] = useState('all');

  useEffect(() => {
    const load = () => {
      const raw = JSON.parse(localStorage.getItem('barber_bookings') || '[]');
      setBookings(raw.sort((a,b) => new Date(a.date) - new Date(b.date)));
    };
    load();
    window.addEventListener('storage', load);
    return () => window.removeEventListener('storage', load);
  }, []);

  const todayStr = new Date().toDateString();
  const isToday = b => new Date(b.date).toDateString() === todayStr;
  const isUpcoming = b => new Date(b.date) >= new Date(new Date().setHours(0,0,0,0));
  const isPast = b => new Date(b.date) < new Date(new Date().setHours(0,0,0,0));

  const filtered = filter === 'all' ? bookings
    : filter === 'today' ? bookings.filter(isToday)
    : filter === 'upcoming' ? bookings.filter(b => isUpcoming(b) && !isToday(b))
    : bookings.filter(isPast);

  const todayCount = bookings.filter(isToday).length;
  const revenue = bookings.filter(isToday).reduce((s,b) => s + b.totalPrice, 0);
  const totalRevenue = bookings.reduce((s,b) => s + b.totalPrice, 0);

  const clearAll = () => {
    if (confirm('Clear all bookings? This cannot be undone.')) {
      localStorage.removeItem('barber_bookings');
      setBookings([]);
    }
  };

  return (
    <div className="admin-overlay" onClick={e => e.target.className === 'admin-overlay' && onClose()}>
      <div className="admin-panel">
        <div className="admin-header">
          <div className="admin-header-left">
            <div className="admin-title">Admin Schedule</div>
            <div className="admin-subtitle">Camille Barber Studio · Live Bookings</div>
          </div>
          <button className="admin-close" onClick={onClose}>✕</button>
        </div>

        <div className="admin-stats">
          <div className="admin-stat-card">
            <div className="admin-stat-num">{todayCount}</div>
            <div className="admin-stat-label">Today's Appts</div>
          </div>
          <div className="admin-stat-card">
            <div className="admin-stat-num">{bookings.length}</div>
            <div className="admin-stat-label">Total Booked</div>
          </div>
          <div className="admin-stat-card">
            <div className="admin-stat-num">${totalRevenue}</div>
            <div className="admin-stat-label">Total Revenue</div>
          </div>
        </div>

        <div className="admin-filters">
          {[['all','All'],['today','Today'],['upcoming','Upcoming'],['past','Past']].map(([v,l]) => (
            <button key={v} className={`admin-filter-btn ${filter===v?'active':''}`} onClick={() => setFilter(v)}>{l}</button>
          ))}
          <button className="admin-filter-btn" style={{marginLeft:'auto',borderColor:'#e8c9c9',color:'#c0392b'}} onClick={clearAll}>Clear All</button>
        </div>

        <div className="admin-body">
          {filtered.length === 0 ? (
            <div className="admin-empty">
              <div className="admin-empty-icon">📋</div>
              <div>No bookings {filter !== 'all' ? `for "${filter}"` : 'yet'}.</div>
              <div style={{marginTop:'0.4rem',fontSize:'0.75rem'}}>Completed bookings from the form will appear here.</div>
            </div>
          ) : (
            <>
              <div className="admin-section-title">
                Appointments
                <span className="admin-count">{filtered.length} record{filtered.length !== 1 ? 's' : ''}</span>
              </div>
              <table className="admin-table">
                <thead>
                  <tr>
                    <th>Client</th>
                    <th>Barber</th>
                    <th>Date & Time</th>
                    <th>Status</th>
                  </tr>
                </thead>
                <tbody>
                  {filtered.map(b => {
                    const d = new Date(b.date);
                    const today = isToday(b);
                    return (
                      <tr key={b.id}>
                        <td>
                          <div className="admin-client-name">{b.client.name}</div>
                          <div className="admin-client-email">{b.client.email}</div>
                          <div className="admin-client-phone">{b.client.phone}</div>
                        </td>
                        <td>
                          <div style={{fontWeight:600}}>{b.barber.name}</div>
                          <div style={{fontSize:'0.7rem',color:'#aaa'}}>{b.barber.title}</div>
                        </td>
                        <td>
                          <div style={{fontWeight:600}}>{d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</div>
                          <div style={{fontSize:'0.72rem',color:'#888'}}>{b.slot}</div>
                        </td>
                        <td>
                          <span className={`admin-badge ${today ? 'badge-today' : 'badge-confirmed'}`}>
                            {today ? 'Today' : 'Confirmed'}
                          </span>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

// ── APP ──
function App() {
  const [mobileOpen, setMobileOpen] = useState(false);
  const [adminOpen, setAdminOpen] = useState(false);
  const bookingRef = useRef(null);
  useCursor();
  useReveal();

  const scrollToBook = () => {
    bookingRef.current?.scrollIntoView({ behavior: 'smooth', block: 'start' });
  };

  // Re-init hover listeners after render
  useEffect(() => {
    const ring = document.getElementById('cursor-ring');
    if (!ring) return;
    const interactives = document.querySelectorAll('a,button,[role="button"],.barber-card,.service-row,.time-slot,.cal-day,.g-item');
    const enter = () => ring.classList.add('hovered');
    const leave = () => ring.classList.remove('hovered');
    interactives.forEach(el => { el.addEventListener('mouseenter', enter); el.addEventListener('mouseleave', leave); });
    return () => interactives.forEach(el => { el.removeEventListener('mouseenter', enter); el.removeEventListener('mouseleave', leave); });
  });

  return (
    <>
      <Navbar onBook={scrollToBook} mobileOpen={mobileOpen} setMobileOpen={setMobileOpen}/>
      <Hero onBook={scrollToBook}/>
      <About/>
      <ServicesShowcase/>
      <BookingSection bookingRef={bookingRef}/>
      <Gallery/>
      <Team/>
      <Contact/>
      <Footer/>
      <button className="admin-toggle-btn" onClick={() => setAdminOpen(true)}>
        ⚙ Admin Schedule
      </button>
      {adminOpen && <AdminPanel onClose={() => setAdminOpen(false)}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
